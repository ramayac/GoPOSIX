name: CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: ["**"]
    paths-ignore:
      - '**.md'

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint → Test → Docker build → Smoke tests
  # ---------------------------------------------------------------------------
  test:
    name: Lint / Test / Docker smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git describe --tags

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Vet
        run: make vet

      - name: Unit tests
        run: CGO_ENABLED=0 go test -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Coverage check
        run: make cover-gate

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}


      - name: Build binary
        run: make build

      - name: Binary size gate (<15 MB)
        run: |
          SIZE=$(stat --format=%s ./goposix)
          MB=$(( SIZE / 1024 / 1024 ))
          echo "Binary size: ${MB} MB (${SIZE} bytes)"
          if [ "${SIZE}" -gt 15728640 ]; then
            echo "::error::Binary size ${MB} MB exceeds 15 MB limit"
            exit 1
          else
            echo "PASS: binary size ${MB} MB is within the 15 MB limit"
          fi

      - name: Verify --list-commands
        run: ./goposix --list-commands

      - name: Validate JSON schemas
        run: make validate-schemas

      - name: Build Docker image
        run: make docker

      - name: Smoke tests (in container)
        run: make smoke

      - name: Tag image for vulnerability scan
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "0.0.0-dev")
          docker tag goposix:${VERSION} goposix:ci-scan

      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: goposix:ci-scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Run BusyBox Test Suite
        run: |
          echo "Running BusyBox test suite..."
          make testsuite > testsuite.log 2>&1 || true
          PASS=$(grep -c "^PASS:" testsuite.log || true)
          FAIL=$(grep -c "^FAIL:" testsuite.log || true)
          SKIPPED=$(grep -c "^SKIPPED:" testsuite.log || true)
          TOTAL=$((PASS + FAIL))
          if [ $TOTAL -eq 0 ]; then
            echo "::warning::No tests executed or output format changed."
            cat testsuite.log
            exit 0
          fi
          PERCENT=$((PASS * 100 / TOTAL))
          echo "::notice::BusyBox Test Suite: ${PERCENT}% pass rate (${PASS} passed, ${FAIL} failed, ${SKIPPED} skipped)"
          if [ $FAIL -gt 0 ]; then
            echo "--- Failures ---"
            grep "^FAIL:" testsuite.log || true
          fi
          if [ $PASS -lt 750 ]; then
            echo "::error::BusyBox pass count ($PASS) dropped below baseline (750)"
            exit 1
          fi

